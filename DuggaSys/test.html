<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="test.css">
</head>
<body>

	<a onclick="changebox()" id="mybutton">Pop-Up</a>

	<div id="box">
	<a onclick="changebox()" class="close">&times;</a>
	<span class="gg-check"></span>
	  <!-- Box content -->
	  <div class="content">
	  <h1>Box Header</h1>
	  <p>Some text in the Box..</p>
	  <button id="login-btn">
      login
      </button>
	 </div>

	 <script>
	 	var c = 0;
	 	function changebox() {
	 		if(c == 0){
	 			document.getElementById("box").style.display = "block";
	 			c = 1;
	 		}else{
	 			document.getElementById("box").style.display = "none";
	 			c = 0;
	 		}
	 	}
	 </script>

	</div>
</body>
</html>
